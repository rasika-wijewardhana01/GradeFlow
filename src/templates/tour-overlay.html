<!-- Tour overlay -->
<div id="gft-overlay" role="dialog" aria-modal="true" aria-label="GradeFlow guided tour" style="display:none;">
  <canvas id="gft-canvas"></canvas>

  <!-- Tooltip card -->
  <div id="gft-tooltip" role="document">
    <!-- Step indicator dots -->
    <div id="gft-dots" aria-hidden="true"></div>

    <!-- Content -->
    <div id="gft-step-label">Step 1 of 7</div>
    <h3 id="gft-title"></h3>
    <p id="gft-body"></p>

    <!-- Actions -->
    <div id="gft-actions">
      <button id="gft-skip" aria-label="Skip tour">Skip tour</button>
      <div id="gft-nav">
        <button id="gft-prev" aria-label="Previous step" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button id="gft-next" aria-label="Next step">
          Next
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Arrow pointer -->
  <div id="gft-arrow" aria-hidden="true"></div>
</div>

<!-- "Take a tour" floating button (shows after tour is skipped/done) -->
<button id="gft-replay-btn" aria-label="Replay guided tour" title="Take a guided tour">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <span>Guide</span>
</button>
