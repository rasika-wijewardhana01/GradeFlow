<div class="legal-modal-overlay" id="legalModalOverlay" onclick="if(event.target===this)closeLegalModal()">
  <div class="legal-modal">
    <div class="legal-modal-header">
      <div class="legal-modal-title-row">
        <div class="legal-modal-icon">
          <svg id="legalModalIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h3 id="legalModalTitle">Privacy Policy</h3>
      </div>
      <div class="legal-modal-tabs">
        <button class="legal-tab active" id="legalTabPrivacy" onclick="switchLegalTab('privacy')">Privacy Policy</button>
        <button class="legal-tab" id="legalTabTerms" onclick="switchLegalTab('terms')">Terms of Service</button>
      </div>
      <button class="legal-modal-close" onclick="closeLegalModal()" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="legal-modal-body" id="legalModalBody">
      <!-- Content injected by openLegalModal() / switchLegalTab() -->
    </div>
    <div class="legal-modal-footer">
      <span class="legal-modal-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" style="vertical-align:middle;margin-right:4px;flex-shrink:0;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        GradeFlow stores all data locally on your device. Nothing is sent to any server.
      </span>
      <button class="btn btn-primary btn-sm" onclick="closeLegalModal()">Got it</button>
    </div>
  </div>
</div>
