<!-- ══ COMPARE TERMS MODAL ══ -->
<div class="compare-modal-overlay" id="compareModalOverlay" onclick="if(event.target===this)closeCompareModal()">
  <div class="compare-modal">
    <div class="compare-modal-header">
      <div>
        <h2 style="display:flex;align-items:center;gap:8px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20" style="flex-shrink:0;color:var(--primary)"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><path d="M7 15h2M13 15h4M13 12h4"/></svg>Term-over-Term Comparison</h2>
        <p>Track student progress across all saved exams</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeCompareModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Close
      </button>
    </div>
    <div class="compare-modal-body" id="compareModalBody">
      <!-- filled by renderCompare() -->
    </div>
    <div class="compare-modal-footer">
      <button class="btn btn-success btn-sm" onclick="exportCompareExcel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Export Comparison
      </button>
      <span id="compareLegend" style="font-size:12px;color:var(--text-muted);margin-left:auto;">▲ Improved &nbsp; ▼ Declined &nbsp; — No change</span>
      <button class="btn btn-ghost btn-sm" onclick="closeCompareModal()">Close</button>
    </div>
  </div>
</div>
