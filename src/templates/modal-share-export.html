<!-- ── Share / Export Modal ── -->
<div class="share-modal-overlay" id="shareModalOverlay" onclick="if(event.target===this)closeShareModal()">
  <div class="share-modal" id="shareModal">
    <div class="share-modal-header">
      <div>
        <h3>Share / Export Results</h3>
        <p>Choose a format to download or share</p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeShareModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M18 6L6 18M6 6l12 12"/></svg>
        Close
      </button>
    </div>
    <div class="share-modal-body">
      <!-- Format options -->
      <div class="share-options">
        <div class="share-option" id="opt-pdf" onclick="selectShareFormat('pdf')">
          <div class="share-option-icon" style="background:#fef2f2;color:#dc2626;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13h1c.6 0 1 .4 1 1v1c0 .6-.4 1-1 1H9v-3zm5 0h2m-2 3h2m-2-1.5H14"/></svg>
          </div>
          <div class="share-option-text">
            <div class="share-option-title">PDF Document</div>
            <div class="share-option-desc">Full result sheet, shareable & printable</div>
          </div>
          <div class="share-option-check" id="check-pdf"></div>
        </div>
        <div class="share-option" id="opt-jpeg" onclick="selectShareFormat('jpeg')">
          <div class="share-option-icon" style="background:#eff6ff;color:#1a56db;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <div class="share-option-text">
            <div class="share-option-title">JPEG Image</div>
            <div class="share-option-desc">Single image, easy to share on WhatsApp</div>
          </div>
          <div class="share-option-check" id="check-jpeg"></div>
        </div>
      </div>

      <!-- Include options -->
      <div class="share-include-section">
        <div class="share-include-label">Include in export</div>
        <div class="share-include-row">
          <label class="share-toggle"><input type="checkbox" id="inc-header" checked><span class="toggle-box"></span>Class header & info</label>
          <label class="share-toggle"><input type="checkbox" id="inc-metrics" checked><span class="toggle-box"></span>Summary stats</label>
          <label class="share-toggle"><input type="checkbox" id="inc-grading"><span class="toggle-box"></span>Grading scale</label>
          <label class="share-toggle" title="Show grade badge (A+, B…) for each subject alongside the mark">
            <input type="checkbox" id="inc-subj-grades">
            <span class="toggle-box toggle-purple"></span>
            Subject grades
          </label>
        </div>
      </div>

      <!-- Progress / preview area -->
      <div id="shareProgress" style="display:none;">
        <div class="share-progress-bar-wrap">
          <div class="share-progress-bar" id="shareProgressBar"></div>
        </div>
        <p id="shareProgressText" style="font-size:13px;color:var(--text-muted);text-align:center;margin-top:8px;">Preparing…</p>
      </div>

      <div id="sharePreviewWrap" style="display:none;margin-top:12px;">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Preview</div>
        <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:260px;overflow-y:auto;">
          <img id="sharePreviewImg" style="width:100%;display:block;" />
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
          <button class="btn btn-primary" id="shareDownloadBtn" onclick="triggerShareDownload()" style="flex:1;justify-content:center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
          <button class="btn btn-ghost" id="shareNativeBtn" onclick="triggerNativeShare()" style="flex:1;justify-content:center;display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
        </div>
      </div>
    </div>
    <div class="share-modal-footer">
      <button class="btn btn-primary" onclick="generateExport()" id="shareGenerateBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Generate
      </button>
      <button class="btn btn-ghost" onclick="closeShareModal()">Cancel</button>
    </div>
  </div>
</div>
