<!-- ══════════════════════════════════════════════════════════════
     FILL-DOWN CONTEXT MENU (right-click / long-press)
     ══════════════════════════════════════════════════════════════ -->
<div id="fillContextMenu" role="menu" aria-label="Column actions">
  <div class="fcm-header" id="fcmHeader">Subject</div>
  <button class="fcm-item fcm-absent-cell" id="fcmCellAbsent" onclick="ctxToggleCellAbsent()" style="color:#dc2626;display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
    Mark this student absent
  </button>
  <div class="fcm-sep" id="fcmCellAbsentSep"></div>
  <button class="fcm-item" id="fcmFillValue" onclick="ctxFillValue()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Fill column with value…
  </button>
  <button class="fcm-item" id="fcmFillAbsent" onclick="ctxFillAbsent()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
    Mark all absent in column
  </button>
  <button class="fcm-item" id="fcmCopyDown" onclick="ctxCopyDown()" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></svg>
    Copy mark down column
  </button>
  <div class="fcm-sep"></div>
  <button class="fcm-item fcm-danger" id="fcmClearColumn" onclick="ctxClearColumn()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
    Clear entire column
  </button>
</div>

<!-- Fill-value prompt overlay -->
<div id="fillValueOverlay" class="fv-overlay" onclick="if(event.target===this)closeFillValuePrompt()">
  <div class="fv-dialog" role="dialog" aria-labelledby="fvTitle">
    <div class="fv-title" id="fvTitle">Fill column with value</div>
    <div class="fv-subject" id="fvSubjectLabel"></div>
    <input class="fv-input" id="fvInput" type="number" min="0" placeholder="Enter mark value" inputmode="numeric"
      onkeydown="if(event.key==='Enter')confirmFillValue();if(event.key==='Escape')closeFillValuePrompt();" />
    <div class="fv-hint" id="fvHint"></div>
    <div class="fv-btns">
      <button class="btn btn-ghost btn-sm" onclick="closeFillValuePrompt()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="confirmFillValue()">Fill all students</button>
    </div>
  </div>
</div>
