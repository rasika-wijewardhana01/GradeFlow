<!-- ══ EXAM MANAGER MODAL — Redesigned ══ -->
<div class="exam-modal-overlay" id="examModalOverlay" onclick="if(event.target===this)closeExamManager()">
  <div class="exam-modal">

    <!-- Header -->
    <div class="exam-modal-header">
      <div class="exam-modal-header-left">
        <div class="exam-modal-header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div>
          <h2>Exam Manager</h2>
          <p>Switch exams &amp; terms — all data saved per exam</p>
        </div>
      </div>
      <button class="exam-modal-close" onclick="closeExamManager()" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Body: filled by renderExamManager() -->
    <div class="exam-modal-body" id="examModalBody"></div>

    <!-- Footer -->
    <div class="exam-modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="openCompareModal()" id="compareBtn" title="Compare results across exams">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
        Compare Terms
      </button>
      <button class="btn btn-ghost btn-sm" onclick="exportAllTermsExcel()" title="Download all exams as Excel file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Export All
      </button>
      <div class="exam-modal-footer-right">
        <button class="btn btn-primary btn-sm" onclick="addNewExam()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>
          New Exam
        </button>
      </div>
    </div>

  </div>
</div>
